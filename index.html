<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客戶關係管理系統</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f2f5;--surface:#fff;--surface2:#f8f9fb;
  --border:#e4e7ec;--border2:#c9cdd6;
  --text:#101828;--muted:#667085;--hint:#98a2b3;
  --blue:#1d4ed8;--blue-light:#eff4ff;--blue-hover:#1e40af;
  --green:#027a48;--green-light:#ecfdf3;
  --red:#b42318;--red-light:#fef3f2;
  --orange:#c2410c;--orange-light:#fff7ed;
  --purple:#6d28d9;--purple-light:#f5f3ff;
  --nav-w:240px;
  --r:8px;--rl:12px;
  --sh:0 1px 3px rgba(16,24,40,.1),0 1px 2px rgba(16,24,40,.06);
  --sh-lg:0 8px 24px rgba(16,24,40,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

/* NAV */
.nav{position:fixed;left:0;top:0;bottom:0;width:var(--nav-w);background:#1a56a0;z-index:100;display:flex;flex-direction:column;}
.nav-logo{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.12);display:flex;align-items:center;gap:10px;}
.nav-icon{width:32px;height:32px;border-radius:7px;background:linear-gradient(135deg,#60a5fa,#1d4ed8);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.nav-title{color:#fff;font-size:14px;font-weight:700;}
.nav-sub{color:#64748b;font-size:11px;}
.nav-item{display:flex;align-items:center;gap:9px;margin:2px 8px;padding:9px 10px;border-radius:7px;color:#bfdbfe;font-size:13px;cursor:pointer;transition:.15s;}
.nav-item:hover{background:rgba(255,255,255,.12);color:#ffffff;}
.nav-item.on{background:rgba(255,255,255,.18);color:#ffffff;}
.nav-item svg{flex-shrink:0;}
.nav-sec{padding:14px 12px 6px;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#93c5fd;}
.nav-bot{margin-top:auto;padding:12px;border-top:1px solid rgba(255,255,255,.12);}
.nav-user{display:flex;align-items:center;gap:9px;padding:8px;}
.nav-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#60a5fa,#818cf8);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.nav-un{font-size:12px;font-weight:500;color:#ffffff;}
.nav-ur{font-size:11px;color:#93c5fd;}

/* MAIN */
.wrap{margin-left:var(--nav-w);min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:58px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-l .ttl{font-size:16px;font-weight:700;}
.topbar-l .sub{font-size:11px;color:var(--muted);}
.topbar-r{display:flex;align-items:center;gap:8px;}
.hide-mobile{display:inline;}
@media(max-width:640px){.hide-mobile{display:none;}}
.badge-count{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--muted);}
.badge-count strong{color:var(--blue);font-family:'DM Mono',monospace;font-size:14px;margin-right:3px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r);font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:.15s;white-space:nowrap;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{background:var(--blue);color:#fff;}
.btn-primary:hover{background:var(--blue-hover);}
.btn-outline{background:var(--surface);color:var(--text);border-color:var(--border);}
.btn-outline:hover{background:var(--surface2);border-color:var(--border2);}
.btn-ghost{background:transparent;color:var(--muted);border-color:var(--border);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-danger{background:var(--red-light);color:var(--red);border-color:#fecdca;}
.btn-danger:hover{background:var(--red);color:#fff;}

/* CONTENT */
.content{padding:22px 24px;flex:1;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;box-shadow:var(--sh);}
.stat-ico{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.stat-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:600;line-height:1;}
.stat-lbl{font-size:12px;color:var(--muted);margin-top:4px;}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.srch{position:relative;flex:1;min-width:180px;}
.srch svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--hint);pointer-events:none;}
.srch input{width:100%;padding:8px 12px 8px 33px;border:1px solid var(--border);border-radius:var(--r);font-family:'Noto Sans TC',sans-serif;font-size:13px;background:var(--surface);color:var(--text);outline:none;transition:.15s;}
.srch input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,78,216,.1);}
select.sel{padding:8px 12px;border:1px solid var(--border);border-radius:var(--r);font-family:'Noto Sans TC',sans-serif;font-size:13px;background:var(--surface);color:var(--text);outline:none;cursor:pointer;}
.vtog{display:flex;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.vtog button{padding:7px 11px;border:none;background:var(--surface);color:var(--muted);cursor:pointer;transition:.12s;}
.vtog button.on{background:var(--blue);color:#fff;}

/* EXPORT DROPDOWN */
.exp-wrap{position:relative;}
.exp-menu{display:none;position:absolute;right:0;top:38px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--sh-lg);min-width:190px;z-index:200;overflow:hidden;}
.exp-menu.open{display:block;}
.exp-item{display:flex;align-items:center;gap:9px;padding:10px 14px;font-size:13px;color:var(--text);cursor:pointer;border:none;background:transparent;width:100%;text-align:left;font-family:'Noto Sans TC',sans-serif;transition:.12s;}
.exp-item:hover{background:var(--surface2);}
.exp-sep{border:none;border-top:1px solid var(--border);}

/* TABLE */
.tcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--sh);overflow:hidden;}
.tcard-head{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border);}
.tcard-title{font-size:14px;font-weight:600;}
.tcard-cnt{font-size:12px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:2px 10px;border-radius:99px;}
table{width:100%;border-collapse:collapse;table-layout:fixed;}
thead th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;background:var(--surface2);border-bottom:1px solid var(--border);}
tbody tr:hover{background:#f5f8ff;}
tbody td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
.td-av{display:flex;align-items:center;gap:9px;}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.av-b{background:#eff4ff;color:#1d4ed8;}
.av-p{background:#f5f3ff;color:#6d28d9;}
.av-g{background:#ecfdf3;color:#027a48;}
.av-o{background:#fff7ed;color:#c2410c;}
.av-k{background:#fdf4ff;color:#a21caf;}
.av-t{background:#f0fdfa;color:#0f766e;}
.td-nm{font-weight:600;font-size:13px;}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;}
.pill-b{background:#eff4ff;color:#1d4ed8;}
.iab{display:flex;gap:4px;}
.ib{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:.12s;}
.ib:hover{background:var(--surface2);color:var(--text);}
.ib.edt:hover{background:var(--blue-light);border-color:#bfdbfe;color:var(--blue);}
.ib.del:hover{background:var(--red-light);border-color:#fecdca;color:var(--red);}

/* CARDS */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.cc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px;box-shadow:var(--sh);transition:.15s;cursor:pointer;}
.cc:hover{box-shadow:var(--sh-lg);transform:translateY(-2px);border-color:var(--border2);}
.cc-top{display:flex;justify-content:space-between;align-items:flex-start;}
.cc-av{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;}
.cc-nm{font-size:15px;font-weight:700;margin-top:10px;}
.cc-co{font-size:12px;color:var(--muted);}
.cc-div{border-top:1px solid var(--border);margin:12px 0;}
.cc-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);margin-bottom:5px;}
.cc-row svg{flex-shrink:0;color:var(--hint);}

/* PAGINATION */
.pgn{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-top:1px solid var(--border);}
.pgn-info{font-size:12px;color:var(--muted);}
.pgn-btns{display:flex;gap:3px;}
.pb{padding:5px 11px;border:1px solid var(--border);border-radius:6px;background:var(--surface);font-size:12px;cursor:pointer;color:var(--muted);transition:.12s;font-family:'Noto Sans TC',sans-serif;}
.pb:hover{background:var(--surface2);}
.pb.on{background:var(--blue);color:#fff;border-color:var(--blue);}

/* DRAWER */
.ov{display:none;position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:300;}
.ov.open{display:block;}
.drawer{position:fixed;right:-540px;top:0;bottom:0;width:500px;background:var(--surface);z-index:301;box-shadow:var(--sh-lg);display:flex;flex-direction:column;transition:right .28s cubic-bezier(.32,.72,0,1);}
.drawer.open{right:0;}
.dh{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.dh-t{font-size:15px;font-weight:700;}
.dh-s{font-size:12px;color:var(--muted);margin-top:2px;}
.dc{flex:1;overflow-y:auto;padding:22px;}
.df{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.dsec{margin-bottom:20px;}
.dsec-t{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:12px;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg.s2{grid-column:1/-1;}
.fl{font-size:12px;font-weight:500;color:var(--muted);}
.fi{padding:8px 11px;border:1px solid var(--border);border-radius:var(--r);font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--text);background:var(--surface);outline:none;transition:.15s;width:100%;}
.fi:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,78,216,.1);}
.fi::placeholder{color:var(--hint);}
textarea.fi{resize:vertical;min-height:88px;}
.fhint{font-size:11px;color:var(--hint);margin-top:2px;}
.fhint.ok{color:var(--green);}
.fhint.er{color:var(--red);}

/* DETAIL */
.det-hd{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.det-av{width:54px;height:54px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;}
.det-nm{font-size:17px;font-weight:700;}
.det-co{font-size:12px;color:var(--muted);margin-top:2px;}
.drow{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.drow:last-child{border-bottom:none;}
.dico{width:30px;height:30px;border-radius:7px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dlb{font-size:11px;color:var(--muted);font-weight:500;}
.dvl{font-size:13px;color:var(--text);word-break:break-all;white-space:pre-wrap;margin-top:1px;}

/* EMPTY / LOADING */
.empty{text-align:center;padding:56px 20px;color:var(--muted);}
.empty-ico{width:60px;height:60px;border-radius:14px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.empty h3{font-size:15px;font-weight:600;color:var(--text);margin-bottom:5px;}
.loading{text-align:center;padding:48px;color:var(--muted);}
.spin{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 10px;}
@keyframes sp{to{transform:rotate(360deg);}}

/* TOAST */

/* ── Login ── */
.login-wrap{position:fixed;inset:0;background:linear-gradient(135deg,#1a56a0,#0f172a);display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-box{background:#fff;border-radius:16px;padding:40px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.login-logo{text-align:center;margin-bottom:24px;}
.login-logo-icon{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
.login-title{font-size:20px;font-weight:700;color:#101828;text-align:center;}
.login-sub{font-size:13px;color:#667085;text-align:center;margin-top:4px;}
.login-form{margin-top:24px;}
.login-label{font-size:12px;font-weight:500;color:#667085;display:block;margin-bottom:5px;}
.login-input{width:100%;padding:10px 12px;border:1px solid #e4e7ec;border-radius:8px;font-family:'Noto Sans TC',sans-serif;font-size:14px;outline:none;transition:.15s;margin-bottom:14px;}
.login-input:focus{border-color:#1d4ed8;box-shadow:0 0 0 3px rgba(29,78,216,.1);}
.login-btn{width:100%;padding:11px;background:#1d4ed8;color:#fff;border:none;border-radius:8px;font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;}
.login-btn:hover{background:#1e40af;}
.login-err{color:#b42318;font-size:12px;text-align:center;margin-top:8px;display:none;}
.login-err.show{display:block;}

/* ── Log Panel ── */
.log-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.log-item:last-child{border-bottom:none;}
.log-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;}
.log-ico.add{background:#ecfdf3;}
.log-ico.edit{background:#eff4ff;}
.log-ico.del{background:#fef3f2;}
.log-time{font-size:11px;color:var(--muted);margin-top:2px;}
.log-txt{font-size:13px;color:var(--text);}

/* ── Mobile ── */
@media(max-width:640px){
  .nav{width:100%;height:56px;flex-direction:row;bottom:0;top:auto;border-top:1px solid rgba(255,255,255,.1);padding:0 8px;}
  .nav-logo,.nav-sec,.nav-bot{display:none;}
  .nav-item{flex-direction:column;gap:2px;padding:6px 10px;font-size:10px;flex:1;justify-content:center;}
  .nav-item svg{width:20px;height:20px;}
  .nav-item span{display:block!important;font-size:10px;}
  .wrap{margin-left:0;margin-bottom:56px;}
  .topbar{padding:0 14px;height:52px;}
  .topbar-l .ttl{font-size:14px;}
  .topbar-l .sub{display:none;}
  .topbar-r .badge-count{display:none;}
  .content{padding:14px;}
  .stats{grid-template-columns:1fr 1fr;gap:10px;}
  .stat{padding:12px;}
  .stat-val{font-size:18px;}
  .toolbar{gap:8px;}
  .srch input{font-size:13px;}
  .tcard-head{padding:10px 14px;}
  table{font-size:12px;}
  thead th{padding:8px 10px;font-size:10px;}
  tbody td{padding:9px 10px;}
  .drawer{width:100%;right:-100%;}
  .cgrid{grid-template-columns:1fr;}
  .fgrid{grid-template-columns:1fr;}
  .fg.s2{grid-column:1;}
  .login-box{width:90%;padding:28px 20px;}
}

/* ── Charts ── */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bar-label{font-size:12px;color:var(--muted);width:100px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{flex:1;background:var(--surface2);border-radius:99px;height:22px;overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:600;color:#fff;transition:width .5s;}
.bar-cnt{font-size:12px;font-family:'DM Mono',monospace;color:var(--muted);width:30px;flex-shrink:0;}
.phone-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 20px;box-shadow:var(--sh);display:flex;align-items:center;gap:14px;margin-bottom:10px;cursor:pointer;transition:.15s;}
.phone-card:hover{box-shadow:var(--sh-lg);border-color:var(--border2);}
.phone-not-found{text-align:center;padding:40px;color:var(--muted);font-size:14px;}

/* ── Print ── */
@media print{
  .nav,.topbar,.topbar-r,.iab,.df,.exp-wrap,.btn-add,.toolbar,.stats,.bday-alert{display:none!important;}
  .wrap{margin-left:0!important;}
  .print-card{display:block!important;}
}
.print-card{display:none;}

/* ── Birthday Alert ── */
.bday-alert{background:#fff7ed;border:1px solid #fed7aa;border-radius:var(--rl);padding:14px 18px;margin-bottom:18px;display:none;}
.bday-alert.show{display:flex;align-items:flex-start;gap:12px;}
.bday-alert-ico{font-size:22px;flex-shrink:0;}
.bday-alert-title{font-size:13px;font-weight:700;color:#c2410c;margin-bottom:6px;}
.bday-alert-list{display:flex;flex-wrap:wrap;gap:6px;}
.bday-chip{background:#fff;border:1px solid #fed7aa;border-radius:99px;padding:3px 12px;font-size:12px;color:#c2410c;font-weight:500;}

/* ── Tags ── */
.tags-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;cursor:pointer;}
.tag-vip{background:#fef9c3;color:#854d0e;border:1px solid #fde047;}
.tag-potential{background:#f0fdf4;color:#166534;border:1px solid #86efac;}
.tag-followup{background:#fdf4ff;color:#7e22ce;border:1px solid #d8b4fe;}
.tag-friend{background:#eff6ff;color:#1e40af;border:1px solid #93c5fd;}
.tag-other{background:#f1f5f9;color:#475569;border:1px solid #cbd5e1;}
.tag-remove{opacity:.6;font-size:10px;}
.tag-remove:hover{opacity:1;}
.tags-input{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:8px;}
.tag-btn{padding:3px 10px;border:1px dashed var(--border2);border-radius:99px;font-size:11px;background:transparent;cursor:pointer;color:var(--muted);transition:.12s;font-family:'Noto Sans TC',sans-serif;}
.tag-btn:hover{background:var(--surface2);color:var(--text);}
.tag-btn.on{border-style:solid;}

/* ── Timeline ── */
.timeline{display:flex;flex-direction:column;gap:0;}
.tl-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.tl-item:last-child{border-bottom:none;}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0;margin-top:6px;}
.tl-date{font-size:11px;color:var(--muted);white-space:nowrap;min-width:80px;}
.tl-text{font-size:13px;color:var(--text);flex:1;}
.tl-del{background:transparent;border:none;color:var(--hint);cursor:pointer;font-size:14px;padding:0 4px;}
.tl-del:hover{color:var(--red);}
.tl-add{display:flex;gap:8px;margin-top:12px;}
.tl-add input{flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-family:'Noto Sans TC',sans-serif;font-size:13px;outline:none;}
.tl-add input:focus{border-color:var(--blue);}
.tl-add button{padding:7px 14px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-family:'Noto Sans TC',sans-serif;font-size:13px;cursor:pointer;}

let all = [], filtered = [], view = 'table', mode = 'add', editId = null, pg = 1;
const PG = 15;
const AVC = ['av-b','av-p','av-g','av-o','av-k','av-t'];

// ── Helpers ──
function av(n){ return AVC[(n||'?').charCodeAt(0) % AVC.length]; }
function ini(n){ return (n||'?').slice(0,2); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function rocToISO(v){
  if(!v) return '';
  v = v.replace(/民國\s*/g,'').trim();
  // 支援純數字格式：YYYMMDD 或 YYMMDD
  if(/^\d{6,7}$/.test(v)){
    const yLen = v.length - 4;
    const roc = parseInt(v.slice(0, yLen));
    const m = v.slice(yLen, yLen+2);
    const d = v.slice(yLen+2, yLen+4);
    if(roc>=1 && roc<=150 && parseInt(m)>=1 && parseInt(m)<=12 && parseInt(d)>=1 && parseInt(d)<=31){
      return (roc+1911)+'-'+m+'-'+d;
    }
  }
  const p = v.replace(/[\/\-\.]/g,'/').split('/');
  if(p.length!==3) return '';
  const roc=parseInt(p[0]);
  if(isNaN(roc)||roc<1||roc>150) return '';
  const y=roc+1911, m=p[1].padStart(2,'0'), d=p[2].padStart(2,'0');
  return y+'-'+m+'-'+d;
}
function isoToROC(s){
  if(!s) return '';
  const p=s.split('-'); if(p.length!==3) return s;
  let y=parseInt(p[0]);
  // 如果年份小於1912，表示資料庫存的是民國年，直接用
  if(y<1912){
    return '民國 '+String(y).padStart(3,'0')+'/'+p[1]+'/'+p[2];
  }
  return '民國 '+(y-1911)+'/'+p[1]+'/'+p[2];
}
function rocHint(v){
  const iso=rocToISO(v); if(!iso) return '';
  const d=new Date(iso);
  return '西元 '+d.getFullYear()+' 年 '+(d.getMonth()+1)+' 月 '+d.getDate()+' 日';
}

function toast(msg, type='ok'){
  const t=document.getElementById('toast');
  const ico = type==='ok'
    ? '<path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>'
    : '<path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>';
  t.innerHTML='<svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">'+ico+'</svg>'+msg;
  t.className='toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ── API ──
async function fetchAll(){
  if(!checkLogin()) return;
  document.getElementById('list').innerHTML='<div class="loading"><div class="spin"></div>連接資料庫中...</div>';
  try{
    const {data, error} = await supa.from('customers').select('*').order('created_at', {ascending:false});
    if(error) throw new Error(error.message);
    all = data;
    updateStats(); applyFilter(); showBdayAlert();
  } catch(e){
    document.getElementById('list').innerHTML='<div class="empty"><div class="empty-ico"><svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="#667085" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg></div><h3>連線失敗</h3><p>'+esc(e.message)+'</p></div>';
  }
}

async function saveCustomer(){
  const name = document.getElementById('fi-name').value.trim();
  if(!name){ toast('請填寫客戶姓名','er'); return; }
  const btn = document.getElementById('btn-save');
  btn.disabled=true; btn.textContent='儲存中...';
  const body = {
    name,
    company: document.getElementById('fi-co').value.trim()||null,
    phone:   document.getElementById('fi-ph').value.trim()||null,
    phone1:  document.getElementById('fi-ph1').value.trim()||null,
    email:   document.getElementById('fi-em').value.trim()||null,
    birthday: rocToISO(document.getElementById('fi-bd').value.trim())||null,
    address: document.getElementById('fi-ad').value.trim()||null,
    notes:   document.getElementById('fi-nt').value.trim()||null,
    group_name: document.getElementById('fi-grp').value.trim()||null,
    tags: document.getElementById('fi-tags').value.trim()||null,
  };
  try{
    let error;
    if(mode==='add'){
      const res = await supa.from('customers').insert(body);
      error = res.error;
    } else {
      const res = await supa.from('customers').update(body).eq('id', editId);
      error = res.error;
    }
    if(error) throw new Error(error.message);
    addLog(mode==='add'?'add':'edit', body.name);
    closeDrawer();
    toast(mode==='add'?'✓ 客戶已建立':'✓ 資料已更新');
    await fetchAll();
  } catch(e){
    toast('儲存失敗：'+e.message,'er');
    btn.disabled=false; btn.textContent='儲存';
  }
}

async function delCustomer(id){
  const c=all.find(x=>x.id===id);
  if(!confirm('確定要刪除「'+(c?c.name:'此客戶')+'」？此動作無法復原。')) return;
  try{
    const cn = all.find(x=>x.id===id);
    const {error} = await supa.from('customers').delete().eq('id', id);
    if(error) throw new Error(error.message);
    addLog('del', cn?cn.name:'未知');
    closeDrawer(); toast('已刪除');
    await fetchAll();
  } catch(e){ toast('刪除失敗：'+e.message,'er'); }
}

// ── Stats ──
function updateStats(){
  document.getElementById('s1').textContent=all.length;
  document.getElementById('s2').textContent=new Set(all.filter(c=>c.company).map(c=>c.company)).size;
  const m=new Date().getMonth()+1;
  document.getElementById('s3').textContent=all.filter(c=>c.birthday&&parseInt(c.birthday.split('-')[1])===m).length;
  document.getElementById('s4').textContent=all.filter(c=>c.email).length;
  document.getElementById('hd-total').textContent=all.length;
}

// ── Filter + Sort ──
function applyFilter(){
  const q=document.getElementById('q').value.toLowerCase();
  const s=document.getElementById('srt').value;
  filtered=all.filter(c=>
    (c.name||'').toLowerCase().includes(q)||
    (c.company||'').toLowerCase().includes(q)||
    (c.email||'').toLowerCase().includes(q)||
    (c.phone||'').includes(q)
  );
  if(s==='name') filtered.sort((a,b)=>(a.name||'').localeCompare(b.name||'','zh'));
  else if(s==='co') filtered.sort((a,b)=>(a.company||'').localeCompare(b.company||'','zh'));
  else if(s==='bday') filtered.sort((a,b)=>(a.birthday||'').localeCompare(b.birthday||''));
  pg=1; render();
}

// ── Render ──
function render(){
  const start=(pg-1)*PG, sl=filtered.slice(start, start+PG);
  const total=Math.ceil(filtered.length/PG);
  if(!filtered.length){
    document.getElementById('list').innerHTML='<div class="empty"><div class="empty-ico"><svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="#667085" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg></div><h3>尚無客戶資料</h3><p>點右上角「新增客戶」開始建立</p></div>';
    return;
  }
  view==='table' ? renderTable(sl, total) : renderCards(sl, total);
}

function pgHTML(total){
  if(total<=1) return '';
  const btns=Array.from({length:total},(_,i)=>'<button class="pb'+(i+1===pg?' on':'')+'" data-p="'+(i+1)+'">'+(i+1)+'</button>').join('');
  return '<div class="pgn"><div class="pgn-info">第 '+((pg-1)*PG+1)+'–'+Math.min(pg*PG,filtered.length)+' 筆，共 '+filtered.length+' 筆</div><div class="pgn-btns">'+btns+'</div></div>';
}

// ── Drawer ──
function formHTML(c){
  // Convert stored ISO date to ROC for editing
  let bd = '';
  if(c&&c.birthday){
    const p=c.birthday.split('-');
    if(p.length===3){
      let y=parseInt(p[0]);
      // if year < 1912, it was stored as ROC year directly
      if(y<1912){
        bd=String(y).padStart(3,'0')+'/'+p[1]+'/'+p[2];
      } else {
        bd=String(y-1911).padStart(3,'0')+'/'+p[1]+'/'+p[2];
      }
    }
  }
  return `
  <div class="dsec"><div class="dsec-t">基本資料</div>
    <div class="fgrid">
      <div class="fg"><label class="fl">姓名 *</label><input class="fi" id="fi-name" placeholder="王小明" value="${esc(c?c.name:'')}"></div>
      <div class="fg"><label class="fl">公司名稱</label><input class="fi" id="fi-co" placeholder="XX 有限公司" value="${esc(c&&c.company?c.company:'')}"></div>
      <div class="fg s2"><label class="fl">來源／分社／群組</label><input class="fi" id="fi-grp" placeholder="例：信義分社、朋友、同學會..." value="${esc(c&&c.group_name?c.group_name:'')}"></div>
    </div>
  </div>
  <div class="dsec"><div class="dsec-t">聯絡方式</div>
    <div class="fgrid">
      <div class="fg"><label class="fl">電話 1</label><input class="fi" id="fi-ph" placeholder="0912-345-678" value="${esc(c&&c.phone?c.phone:'')}"></div>
      <div class="fg"><label class="fl">電話 2</label><input class="fi" id="fi-ph1" placeholder="0912-345-678" value="${esc(c&&c.phone1?c.phone1:'')}"></div>
      <div class="fg s2"><label class="fl">Email</label><input class="fi" type="email" id="fi-em" placeholder="example@mail.com" value="${esc(c&&c.email?c.email:'')}"></div>
    </div>
  </div>
  <div class="dsec"><div class="dsec-t">其他資料</div>
    <div class="fgrid">
      <div class="fg">
        <label class="fl">生日（民國年/月/日）</label>
        <input class="fi" id="fi-bd" placeholder="例：080/05/22 或 0800522" maxlength="10" value="${esc(bd)}">
        <div class="fhint ok" id="bd-hint">${bd?'✓ '+rocHint(bd):''}</div>
      </div>
      <div class="fg"><label class="fl">地址</label><input class="fi" id="fi-ad" placeholder="台北市..." value="${esc(c&&c.address?c.address:'')}"></div>
    </div>
    <div class="fg" style="margin-top:12px"><label class="fl">備註</label><textarea class="fi" id="fi-nt" placeholder="例：偏好、需求、特殊事項...">${esc(c&&c.notes?c.notes:'')}</textarea></div>
    <div class="fg" style="margin-top:12px">
      <label class="fl">標籤</label>
      <div class="tags-input">
        <button class="tag-btn tag-vip" onclick="toggleTag(this,'VIP')">VIP</button>
        <button class="tag-btn tag-potential" onclick="toggleTag(this,'潛在客戶')">潛在客戶</button>
        <button class="tag-btn tag-followup" onclick="toggleTag(this,'待跟進')">待跟進</button>
        <button class="tag-btn tag-friend" onclick="toggleTag(this,'朋友')">朋友</button>
        <button class="tag-btn tag-other" onclick="toggleTag(this,'其他')">其他</button>
      </div>
      <input type="hidden" id="fi-tags" value="${esc(c&&c.tags?c.tags:'')}">
    </div>
  </div>`;
}

function exportCSV(){
  if(!all.length){toast('尚無資料','er');return;}
  const cols=['姓名','公司名稱','電話','Email','生日','地址','備註/往來記錄','建立日期'];
  const rows=getData().map(r=>cols.map(k=>'"'+String(r[k]).replace(/"/g,'""')+'"').join(','));
  const csv='\uFEFF'+[cols.join(','),...rows].join('\n');
  dl(new Blob([csv],{type:'text/csv;charset=utf-8'}), '客戶資料_'+today()+'.csv');
  toast('✓ CSV 已匯出');
}
function exportXLSX(){
  if(!all.length){toast('尚無資料','er');return;}
  try{
    const cols = ['姓名','公司名稱','來源群組','電話1','電話2','Email','生日','地址','備註','建立日期'];
    const rows = all.map(c=>{
      const bday = (c.birthday && typeof c.birthday === 'string') ? isoToROC(c.birthday) : '';
      const created = (c.created_at && typeof c.created_at === 'string') ? new Date(c.created_at).toLocaleDateString('zh-TW') : '';
      return [
        String(c.name||''),
        String(c.company||''),
        String(c.group_name||''),
        String(c.phone||''),
        String(c.phone1||''),
        String(c.email||''),
        String(bday),
        String(c.address||''),
        String(c.notes||''),
        String(created)
      ];
    });
    const ws = XLSX.utils.aoa_to_sheet([cols, ...rows]);
    ws['!cols']=[{wch:12},{wch:20},{wch:14},{wch:14},{wch:14},{wch:28},{wch:14},{wch:30},{wch:40},{wch:14}];
    const wb = {SheetNames:['Data'], Sheets:{Data:ws}};
    XLSX.writeFile(wb,'客戶資料_'+today()+'.xlsx');
    toast('✓ Excel 已匯出');
  }catch(e){
    console.error('Excel匯出錯誤:', e);
    toast('匯出失敗：'+e.message,'er');
  }
}
function today(){return new Date().toLocaleDateString('zh-TW').replace(/\//g,'-');}
function dl(blob, name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();}

// ── Google Drive ──
let gToken=null;
const GID=localStorage.getItem('gdrive_cid')||'';

function uploadGDrive(){
  if(!all.length){toast('尚無資料','er');return;}
  const cid=localStorage.getItem('gdrive_cid')||'';
  if(!cid){showGSetup();return;}
  if(gToken){doUpload(cid);return;}
  const script=document.createElement('script');
  script.src='https://accounts.google.com/gsi/client';
  script.onload=()=>{
    const client=google.accounts.oauth2.initTokenClient({
      client_id:cid, scope:'https://www.googleapis.com/auth/drive.file',
      callback:(r)=>{if(r.error){toast('Google 授權失敗','er');return;}gToken=r.access_token;doUpload(cid);}
    });
    client.requestAccessToken();
  };
  document.head.appendChild(script);
}

async function doUpload(cid){
  toast('上傳中...');
  try{
    const ws=XLSX.utils.json_to_sheet(getData());
    ws['!cols']=[{wch:12},{wch:20},{wch:15},{wch:28},{wch:14},{wch:30},{wch:40},{wch:14}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,'Customers',ws);
    const buf=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    const fname='客戶資料_'+today()+'.xlsx';
    const form=new FormData();
    form.append('metadata',new Blob([JSON.stringify({name:fname})],{type:'application/json'}));
    form.append('file',new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}));
    const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
      method:'POST',headers:{Authorization:'Bearer '+gToken},body:form
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    toast('✓ 已上傳到 Google 雲端硬碟');
  }catch(e){gToken=null;toast('上傳失敗：'+e.message,'er');}
}

// 帳號密碼存在 localStorage，可在系統內修改
function getUsers(){
  const stored = localStorage.getItem('crm_users');
  if(stored) return JSON.parse(stored);
  // 預設帳號密碼（首次使用）
  const def = {'admin':'crm2024'};

  return def;
}
function saveUsers(u){ localStorage.setItem('crm_users', JSON.stringify(u)); }
const SESSION_KEY = 'crm_session';

function checkLogin(){
  const s = sessionStorage.getItem(SESSION_KEY);
  if(s){
    const d = JSON.parse(s);
    if(d && d.user){
      document.getElementById('login-wrap').style.display='none';
      document.getElementById('nav-uname').textContent=d.user;
      return true;
    }
  }
  return false;
}

function doLogin(){
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-err');
  const USERS=getUsers();
  if(USERS[user] && USERS[user]===pass){
    sessionStorage.setItem(SESSION_KEY, JSON.stringify({user}));
    document.getElementById('login-wrap').style.display='none';
    document.getElementById('nav-uname').textContent=user;
    err.classList.remove('show');
    fetchAll();
  } else {
    err.classList.add('show');
    document.getElementById('login-pass').value='';
    document.getElementById('login-pass').focus();
  }
}

      </div>

    </div>`;
  document.getElementById('df').innerHTML=`
    <button class="btn btn-outline" onclick="closeDrawer()">取消</button>

  // Enter key

function doChangePass(){
  const s = sessionStorage.getItem(SESSION_KEY);
  const user = s ? JSON.parse(s).user : '';
  const oldP = document.getElementById('cp-old').value;
  const newP = document.getElementById('cp-new').value;
  const conf = document.getElementById('cp-confirm').value;
  const err = document.getElementById('cp-err');
  err.style.display='none';

  const users = getUsers();
  if(!users[user] || users[user]!==oldP){
    err.textContent='目前密碼錯誤'; err.style.display='block'; return;
  }
  if(newP.length<6){
    err.textContent='新密碼至少需要6個字元'; err.style.display='block'; return;
  }
  if(newP!==conf){
    err.textContent='兩次輸入的新密碼不一致'; err.style.display='block'; return;
  }
  users[user]=newP;
  saveUsers(users);
  addLog('edit','（密碼已修改）');
  closeDrawer();
  toast('✓ 密碼已成功修改');
}

// ── Charts ──
const COLORS=['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316','#84cc16'];
function renderCharts(){
  // Group chart
  const groups={};
  all.forEach(c=>{ const g=c.group_name||'未填'; groups[g]=(groups[g]||0)+1; });
  const gSorted=Object.entries(groups).sort((a,b)=>b[1]-a[1]);
  const gMax=gSorted[0]?gSorted[0][1]:1;
  document.getElementById('chart-group').innerHTML = gSorted.map(([g,n],i)=>
    `<div class="bar-row"><div class="bar-label" title="${esc(g)}">${esc(g)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/gMax*100)}%;background:${COLORS[i%COLORS.length]}">${n}</div></div><div class="bar-cnt">${n}</div></div>`
  ).join('') || '<div style="color:var(--muted);font-size:13px;">尚無資料</div>';

  // Monthly chart - last 6 months
  const months={};
  for(let i=5;i>=0;i--){
    const d=new Date(); d.setMonth(d.getMonth()-i);
    const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    months[key]=0;
  }
  all.forEach(c=>{
    if(!c.created_at) return;
    const key=c.created_at.slice(0,7);
    if(months[key]!==undefined) months[key]++;
  });
  const mEntries=Object.entries(months);
  const mMax=Math.max(...mEntries.map(e=>e[1]),1);
  document.getElementById('chart-monthly').innerHTML = mEntries.map(([m,n],i)=>{
    const label=m.slice(5)+'月';
    return `<div class="bar-row"><div class="bar-label">${label}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/mMax*100)}%;background:${COLORS[i%COLORS.length]}">${n>0?n:''}</div></div><div class="bar-cnt">${n}</div></div>`;
  }).join('');

  // Tags chart
  const tags={};
  all.forEach(c=>{ if(c.tags) c.tags.split(',').forEach(t=>{ const tt=t.trim(); if(tt) tags[tt]=(tags[tt]||0)+1; }); });
  const tSorted=Object.entries(tags).sort((a,b)=>b[1]-a[1]);
  document.getElementById('chart-tags').innerHTML = tSorted.length
    ? tSorted.map(([t,n])=>`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 18px;text-align:center;"><div style="font-size:22px;font-weight:700;color:var(--blue)">${n}</div><div style="font-size:12px;color:var(--muted);margin-top:2px;">${esc(t)}</div></div>`).join('')
    : '<div style="color:var(--muted);font-size:13px;">尚無標籤資料</div>';
}

    </div>`).join('');
}

// ── Tag helpers ──
function tagClass(t){
  const m={'VIP':'vip','潛在客戶':'potential','待跟進':'followup','朋友':'friend'};
  return m[t]||'other';
}
function toggleTag(btn, name){
  const fi = document.getElementById('fi-tags');
  let tags = fi.value ? fi.value.split(',').map(t=>t.trim()).filter(Boolean) : [];
  if(tags.includes(name)){
    tags = tags.filter(t=>t!==name);
    btn.classList.remove('on');
  } else {
    tags.push(name);
    btn.classList.add('on');
  }
  fi.value = tags.join(',');
}
function initTagBtns(tags){
  const arr = tags ? tags.split(',').map(t=>t.trim()) : [];
  document.querySelectorAll('.tag-btn').forEach(btn=>{
    const name = btn.textContent.trim();
    if(arr.includes(name)) btn.classList.add('on');
  });
}

// ── Birthday alert ──
function showBdayAlert(){
  const m = new Date().getMonth()+1;
  const d = new Date().getDate();
  const soon = all.filter(c=>{
    if(!c.birthday) return false;
    const p=c.birthday.split('-');
    if(p.length<3) return false;
    const cm=parseInt(p[1]), cd=parseInt(p[2]);
    return cm===m;
  });
  const alert=document.getElementById('bday-alert');
  const list=document.getElementById('bday-list');
  if(soon.length){
    list.innerHTML=soon.map(c=>{
      const p=c.birthday.split('-');
      const cd=parseInt(p[2]);
      const diff=cd-d;
      const label=diff===0?'🎂 今天！':diff>0?cd+'日':'本月'+cd+'日';
      return '<span class="bday-chip">'+esc(c.name)+' '+label+'</span>';
    }).join('');
    alert.classList.add('show');
  } else {
    alert.classList.remove('show');
  }
}
