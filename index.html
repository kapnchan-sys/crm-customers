<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客戶關係管理系統</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f2f5;--surface:#fff;--surface2:#f8f9fb;
  --border:#e4e7ec;--border2:#c9cdd6;
  --text:#101828;--muted:#667085;--hint:#98a2b3;
  --blue:#1d4ed8;--blue-light:#eff4ff;--blue-hover:#1e40af;
  --green:#027a48;--green-light:#ecfdf3;
  --red:#b42318;--red-light:#fef3f2;
  --orange:#c2410c;--orange-light:#fff7ed;
  --purple:#6d28d9;--purple-light:#f5f3ff;
  --nav-w:240px;
  --r:8px;--rl:12px;
  --sh:0 1px 3px rgba(16,24,40,.1),0 1px 2px rgba(16,24,40,.06);
  --sh-lg:0 8px 24px rgba(16,24,40,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

/* NAV */
.nav{position:fixed;left:0;top:0;bottom:0;width:var(--nav-w);background:#1a56a0;z-index:100;display:flex;flex-direction:column;}
.nav-logo{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.12);display:flex;align-items:center;gap:10px;}
.nav-icon{width:32px;height:32px;border-radius:7px;background:linear-gradient(135deg,#60a5fa,#1d4ed8);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.nav-title{color:#fff;font-size:14px;font-weight:700;}
.nav-sub{color:#64748b;font-size:11px;}
.nav-item{display:flex;align-items:center;gap:9px;margin:2px 8px;padding:9px 10px;border-radius:7px;color:#bfdbfe;font-size:13px;cursor:pointer;transition:.15s;}
.nav-item:hover{background:rgba(255,255,255,.12);color:#ffffff;}
.nav-item.on{background:rgba(255,255,255,.18);color:#ffffff;}
.nav-item svg{flex-shrink:0;}
.nav-sec{padding:14px 12px 6px;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#93c5fd;}
.nav-bot{margin-top:auto;padding:12px;border-top:1px solid rgba(255,255,255,.12);}
.nav-user{display:flex;align-items:center;gap:9px;padding:8px;}
.nav-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#60a5fa,#818cf8);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.nav-un{font-size:12px;font-weight:500;color:#ffffff;}
.nav-ur{font-size:11px;color:#93c5fd;}

/* MAIN */
.wrap{margin-left:var(--nav-w);min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:58px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-l .ttl{font-size:16px;font-weight:700;}
.topbar-l .sub{font-size:11px;color:var(--muted);}
.topbar-r{display:flex;align-items:center;gap:8px;}
.badge-count{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--muted);}
.badge-count strong{color:var(--blue);font-family:'DM Mono',monospace;font-size:14px;margin-right:3px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r);font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:.15s;white-space:nowrap;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{background:var(--blue);color:#fff;}
.btn-primary:hover{background:var(--blue-hover);}
.btn-outline{background:var(--surface);color:var(--text);border-color:var(--border);}
.btn-outline:hover{background:var(--surface2);border-color:var(--border2);}
.btn-ghost{background:transparent;color:var(--muted);border-color:var(--border);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-danger{background:var(--red-light);color:var(--red);border-color:#fecdca;}
.btn-danger:hover{background:var(--red);color:#fff;}

/* CONTENT */
.content{padding:22px 24px;flex:1;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;box-shadow:var(--sh);}
.stat-ico{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.stat-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:600;line-height:1;}
.stat-lbl{font-size:12px;color:var(--muted);margin-top:4px;}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.srch{position:relative;flex:1;min-width:180px;}
.srch svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--hint);pointer-events:none;}
.srch input{width:100%;padding:8px 12px 8px 33px;border:1px solid var(--border);border-radius:var(--r);font-family:'Noto Sans TC',sans-serif;font-size:13px;background:var(--surface);color:var(--text);outline:none;transition:.15s;}
.srch input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,78,216,.1);}
select.sel{padding:8px 12px;border:1px solid var(--border);border-radius:var(--r);font-family:'Noto Sans TC',sans-serif;font-size:13px;background:var(--surface);color:var(--text);outline:none;cursor:pointer;}
.vtog{display:flex;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.vtog button{padding:7px 11px;border:none;background:var(--surface);color:var(--muted);cursor:pointer;transition:.12s;}
.vtog button.on{background:var(--blue);color:#fff;}

/* EXPORT DROPDOWN */
.exp-wrap{position:relative;}
.exp-menu{display:none;position:absolute;right:0;top:38px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--sh-lg);min-width:190px;z-index:200;overflow:hidden;}
.exp-menu.open{display:block;}
.exp-item{display:flex;align-items:center;gap:9px;padding:10px 14px;font-size:13px;color:var(--text);cursor:pointer;border:none;background:transparent;width:100%;text-align:left;font-family:'Noto Sans TC',sans-serif;transition:.12s;}
.exp-item:hover{background:var(--surface2);}
.exp-sep{border:none;border-top:1px solid var(--border);}

/* TABLE */
.tcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);box-shadow:var(--sh);overflow:hidden;}
.tcard-head{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border);}
.tcard-title{font-size:14px;font-weight:600;}
.tcard-cnt{font-size:12px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:2px 10px;border-radius:99px;}
table{width:100%;border-collapse:collapse;table-layout:fixed;}
thead th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;background:var(--surface2);border-bottom:1px solid var(--border);}
tbody tr:hover{background:#f5f8ff;}
tbody td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
.td-av{display:flex;align-items:center;gap:9px;}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.av-b{background:#eff4ff;color:#1d4ed8;}
.av-p{background:#f5f3ff;color:#6d28d9;}
.av-g{background:#ecfdf3;color:#027a48;}
.av-o{background:#fff7ed;color:#c2410c;}
.av-k{background:#fdf4ff;color:#a21caf;}
.av-t{background:#f0fdfa;color:#0f766e;}
.td-nm{font-weight:600;font-size:13px;}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;}
.pill-b{background:#eff4ff;color:#1d4ed8;}
.iab{display:flex;gap:4px;}
.ib{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:.12s;}
.ib:hover{background:var(--surface2);color:var(--text);}
.ib.edt:hover{background:var(--blue-light);border-color:#bfdbfe;color:var(--blue);}
.ib.del:hover{background:var(--red-light);border-color:#fecdca;color:var(--red);}

/* CARDS */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.cc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px;box-shadow:var(--sh);transition:.15s;cursor:pointer;}
.cc:hover{box-shadow:var(--sh-lg);transform:translateY(-2px);border-color:var(--border2);}
.cc-top{display:flex;justify-content:space-between;align-items:flex-start;}
.cc-av{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;}
.cc-nm{font-size:15px;font-weight:700;margin-top:10px;}
.cc-co{font-size:12px;color:var(--muted);}
.cc-div{border-top:1px solid var(--border);margin:12px 0;}
.cc-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);margin-bottom:5px;}
.cc-row svg{flex-shrink:0;color:var(--hint);}

/* PAGINATION */
.pgn{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-top:1px solid var(--border);}
.pgn-info{font-size:12px;color:var(--muted);}
.pgn-btns{display:flex;gap:3px;}
.pb{padding:5px 11px;border:1px solid var(--border);border-radius:6px;background:var(--surface);font-size:12px;cursor:pointer;color:var(--muted);transition:.12s;font-family:'Noto Sans TC',sans-serif;}
.pb:hover{background:var(--surface2);}
.pb.on{background:var(--blue);color:#fff;border-color:var(--blue);}

/* DRAWER */
.ov{display:none;position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:300;}
.ov.open{display:block;}
.drawer{position:fixed;right:-540px;top:0;bottom:0;width:500px;background:var(--surface);z-index:301;box-shadow:var(--sh-lg);display:flex;flex-direction:column;transition:right .28s cubic-bezier(.32,.72,0,1);}
.drawer.open{right:0;}
.dh{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.dh-t{font-size:15px;font-weight:700;}
.dh-s{font-size:12px;color:var(--muted);margin-top:2px;}
.dc{flex:1;overflow-y:auto;padding:22px;}
.df{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.dsec{margin-bottom:20px;}
.dsec-t{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:12px;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg.s2{grid-column:1/-1;}
.fl{font-size:12px;font-weight:500;color:var(--muted);}
.fi{padding:8px 11px;border:1px solid var(--border);border-radius:var(--r);font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--text);background:var(--surface);outline:none;transition:.15s;width:100%;}
.fi:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,78,216,.1);}
.fi::placeholder{color:var(--hint);}
textarea.fi{resize:vertical;min-height:88px;}
.fhint{font-size:11px;color:var(--hint);margin-top:2px;}
.fhint.ok{color:var(--green);}
.fhint.er{color:var(--red);}

/* DETAIL */
.det-hd{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.det-av{width:54px;height:54px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;}
.det-nm{font-size:17px;font-weight:700;}
.det-co{font-size:12px;color:var(--muted);margin-top:2px;}
.drow{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.drow:last-child{border-bottom:none;}
.dico{width:30px;height:30px;border-radius:7px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dlb{font-size:11px;color:var(--muted);font-weight:500;}
.dvl{font-size:13px;color:var(--text);word-break:break-all;white-space:pre-wrap;margin-top:1px;}

/* EMPTY / LOADING */
.empty{text-align:center;padding:56px 20px;color:var(--muted);}
.empty-ico{width:60px;height:60px;border-radius:14px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.empty h3{font-size:15px;font-weight:600;color:var(--text);margin-bottom:5px;}
.loading{text-align:center;padding:48px;color:var(--muted);}
.spin{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 10px;}
@keyframes sp{to{transform:rotate(360deg);}}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none;display:flex;align-items:center;gap:7px;max-width:320px;box-shadow:var(--sh-lg);}
.toast.ok{background:#1a56a0;color:#fff;}
.toast.er{background:var(--red);color:#fff;}
.toast.show{opacity:1;transform:translateY(0);}

/* GDRIVE SETUP */
.step{display:flex;gap:12px;margin-bottom:14px;}
.step-n{width:24px;height:24px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.step-t{font-weight:600;font-size:13px;margin-bottom:2px;}
.step-d{font-size:12px;color:var(--muted);}

@media(max-width:860px){
  .nav{width:60px;}
  .nav-title,.nav-sub,.nav-item span,.nav-un,.nav-ur,.nav-sec{display:none;}
  .wrap{margin-left:60px;}
  .stats{grid-template-columns:1fr 1fr;}
  .drawer{width:100%;right:-100%;}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">
    <div class="nav-icon">
      <svg width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    </div>
    <div><div class="nav-title">CRM 系統</div><div class="nav-sub">客戶關係管理</div></div>
  </div>
  <div class="nav-sec">主選單</div>
  <div class="nav-item on">
    <svg width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    <span>往來客戶</span>
  </div>
  <div class="nav-bot">
    <div class="nav-user"><div class="nav-av">管</div><div><div class="nav-un">管理員</div><div class="nav-ur">系統管理員</div></div></div>
  </div>
</nav>

<div class="wrap">
  <div class="topbar">
    <div class="topbar-l">
      <div class="ttl">往來客戶管理</div>
      <div class="sub">Customer Relationship Management</div>
    </div>
    <div class="topbar-r">
      <div class="badge-count"><strong id="hd-total">—</strong>位客戶</div>
      <div class="exp-wrap">
        <button class="btn btn-outline" id="exp-btn">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          匯出
          <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div class="exp-menu" id="exp-menu">
          <button class="exp-item" id="exp-csv">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="#667085" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            匯出成 CSV
          </button>
          <button class="exp-item" id="exp-xlsx">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="#16a34a" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M3 14h18M10 3v18M3 3h18a0 0 0 010 18H3z"/></svg>
            <span style="color:#16a34a;font-weight:600;">匯出成 Excel (.xlsx)</span>
          </button>
          <hr class="exp-sep">
          <button class="exp-item" id="exp-gdrive">
            <svg width="15" height="15" viewBox="0 0 87.3 78" xmlns="http://www.w3.org/2000/svg"><path d="M6.6 66.85l3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3L27.5 53H0c0 1.55.4 3.1 1.2 4.5z" fill="#0066da"/><path d="M43.65 25L29.9 1.2C28.55 2 27.4 3.1 26.6 4.5L1.2 48.5C.4 49.9 0 51.45 0 53h27.5z" fill="#00ac47"/><path d="M73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75L86.1 57.5c.8-1.4 1.2-2.95 1.2-4.5H59.8L65.5 64z" fill="#ea4335"/><path d="M43.65 25L57.4 1.2C56.05.4 54.5 0 52.95 0H34.35c-1.55 0-3.1.45-4.45 1.2z" fill="#00832d"/><path d="M59.8 53H27.5L13.75 76.8c1.35.8 2.9 1.2 4.45 1.2h50.9c1.55 0 3.1-.4 4.45-1.2z" fill="#2684fc"/><path d="M73.4 26.5l-12.65-21.9c-.8-1.4-1.95-2.5-3.3-3.3L43.65 25 59.8 53h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="#ffba00"/></svg>
            上傳到 Google 雲端硬碟
          </button>
        </div>
      </div>
      <button class="btn btn-primary" id="btn-add">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        新增客戶
      </button>
    </div>
  </div>

  <div class="content">
    <div class="stats">
      <div class="stat"><div class="stat-ico" style="background:#eff4ff"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#1d4ed8" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg></div><div class="stat-val" id="s1" style="color:var(--blue)">—</div><div class="stat-lbl">客戶總數</div></div>
      <div class="stat"><div class="stat-ico" style="background:#ecfdf3"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#027a48" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg></div><div class="stat-val" id="s2" style="color:#027a48">—</div><div class="stat-lbl">公司數</div></div>

<script>
// ── Config ──
const SUPA_URL = 'https://tltmsyexrjsahecnethw.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRsdG1zeWV4cmpzYWhlY25ldGh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0MTg4NjcsImV4cCI6MjA5NDk5NDg2N30.2icB5FExKHvwWtSKczgjD6dWUKJxGwKinEScF2t48iY';
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── State ──
let all = [], filtered = [], view = 'table', mode = 'add', editId = null, pg = 1;
const PG = 15;

// ── Helpers ──
function av(n){ return AVC[(n||'?').charCodeAt(0) % AVC.length]; }
function ini(n){ return (n||'?').slice(0,2); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function rocToISO(v){
  if(!v) return '';
  v = v.replace(/民國\s*/g,'').trim();
  // 支援純數字格式：YYYMMDD 或 YYMMDD
  if(/^\d{6,7}$/.test(v)){
    const yLen = v.length - 4;
    const roc = parseInt(v.slice(0, yLen));
    const m = v.slice(yLen, yLen+2);
    const d = v.slice(yLen+2, yLen+4);
    if(roc>=1 && roc<=150 && parseInt(m)>=1 && parseInt(m)<=12 && parseInt(d)>=1 && parseInt(d)<=31){
      return (roc+1911)+'-'+m+'-'+d;
    }
  }
  const p = v.replace(/[\/\-\.]/g,'/').split('/');
  if(p.length!==3) return '';
  const roc=parseInt(p[0]);
  if(isNaN(roc)||roc<1||roc>150) return '';
  const y=roc+1911, m=p[1].padStart(2,'0'), d=p[2].padStart(2,'0');
  return y+'-'+m+'-'+d;
}
function isoToROC(s){
  if(!s) return '';
  const p=s.split('-'); if(p.length!==3) return s;
  let y=parseInt(p[0]);
  // 如果年份小於1912，表示資料庫存的是民國年，直接用
  if(y<1912){
    return '民國 '+String(y).padStart(3,'0')+'/'+p[1]+'/'+p[2];
  }
  return '民國 '+(y-1911)+'/'+p[1]+'/'+p[2];
}
function rocHint(v){
  const iso=rocToISO(v); if(!iso) return '';
  const d=new Date(iso);
  return '西元 '+d.getFullYear()+' 年 '+(d.getMonth()+1)+' 月 '+d.getDate()+' 日';
}

function toast(msg, type='ok'){
  const t=document.getElementById('toast');
  const ico = type==='ok'
    ? '<path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>'
    : '<path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>';
  t.innerHTML='<svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">'+ico+'</svg>'+msg;
  t.className='toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ── API ──
async function fetchAll(){
  document.getElementById('list').innerHTML='<div class="loading"><div class="spin"></div>連接資料庫中...</div>';
  try{
    const {data, error} = await supa.from('customers').select('*').order('created_at', {ascending:false});
    if(error) throw new Error(error.message);
    all = data;
    updateStats(); applyFilter();
  } catch(e){
    document.getElementById('list').innerHTML='<div class="empty"><div class="empty-ico"><svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="#667085" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg></div><h3>連線失敗</h3><p>'+esc(e.message)+'</p></div>';
  }
}

async function saveCustomer(){
  const name = document.getElementById('fi-name').value.trim();
  if(!name){ toast('請填寫客戶姓名','er'); return; }
  const btn = document.getElementById('btn-save');
  btn.disabled=true; btn.textContent='儲存中...';
  const body = {
    name,
    company: document.getElementById('fi-co').value.trim()||null,
    phone:   document.getElementById('fi-ph').value.trim()||null,
    phone1:  document.getElementById('fi-ph1').value.trim()||null,
    email:   document.getElementById('fi-em').value.trim()||null,
    birthday: rocToISO(document.getElementById('fi-bd').value.trim())||null,
    address: document.getElementById('fi-ad').value.trim()||null,
    notes:   document.getElementById('fi-nt').value.trim()||null,
    group_name: document.getElementById('fi-grp').value.trim()||null,
  };
  try{
    let error;
    if(mode==='add'){
      const res = await supa.from('customers').insert(body);
      error = res.error;
    } else {
      const res = await supa.from('customers').update(body).eq('id', editId);
      error = res.error;
    }
    if(error) throw new Error(error.message);
    closeDrawer();
    toast(mode==='add'?'✓ 客戶已建立':'✓ 資料已更新');
    await fetchAll();
  } catch(e){
    toast('儲存失敗：'+e.message,'er');
    btn.disabled=false; btn.textContent='儲存';
  }
}

async function delCustomer(id){
  const c=all.find(x=>x.id===id);
  if(!confirm('確定要刪除「'+(c?c.name:'此客戶')+'」？此動作無法復原。')) return;
  try{
    const {error} = await supa.from('customers').delete().eq('id', id);
    if(error) throw new Error(error.message);
    closeDrawer(); toast('已刪除');
    await fetchAll();
  } catch(e){ toast('刪除失敗：'+e.message,'er'); }
}

// ── Stats ──
function updateStats(){
  document.getElementById('s1').textContent=all.length;
  document.getElementById('s2').textContent=new Set(all.filter(c=>c.company).map(c=>c.company)).size;
  const m=new Date().getMonth()+1;
  document.getElementById('s3').textContent=all.filter(c=>c.birthday&&parseInt(c.birthday.split('-')[1])===m).length;
  document.getElementById('s4').textContent=all.filter(c=>c.email).length;
  document.getElementById('hd-total').textContent=all.length;
}

// ── Filter + Sort ──
function applyFilter(){
  const q=document.getElementById('q').value.toLowerCase();
  const s=document.getElementById('srt').value;
  filtered=all.filter(c=>
    (c.name||'').toLowerCase().includes(q)||
    (c.company||'').toLowerCase().includes(q)||
    (c.email||'').toLowerCase().includes(q)||
    (c.phone||'').includes(q)
  );
  if(s==='name') filtered.sort((a,b)=>(a.name||'').localeCompare(b.name||'','zh'));
  else if(s==='co') filtered.sort((a,b)=>(a.company||'').localeCompare(b.company||'','zh'));
  else if(s==='bday') filtered.sort((a,b)=>(a.birthday||'').localeCompare(b.birthday||''));
  pg=1; render();
}

// ── Render ──
function render(){
  const start=(pg-1)*PG, sl=filtered.slice(start, start+PG);
  const total=Math.ceil(filtered.length/PG);
  if(!filtered.length){
    document.getElementById('list').innerHTML='<div class="empty"><div class="empty-ico"><svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="#667085" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg></div><h3>尚無客戶資料</h3><p>點右上角「新增客戶」開始建立</p></div>';
    return;
  }
  view==='table' ? renderTable(sl, total) : renderCards(sl, total);
}

function pgHTML(total){
  if(total<=1) return '';
  const btns=Array.from({length:total},(_,i)=>'<button class="pb'+(i+1===pg?' on':'')+'" data-p="'+(i+1)+'">'+(i+1)+'</button>').join('');
  return '<div class="pgn"><div class="pgn-info">第 '+((pg-1)*PG+1)+'–'+Math.min(pg*PG,filtered.length)+' 筆，共 '+filtered.length+' 筆</div><div class="pgn-btns">'+btns+'</div></div>';
}

// ── Export ──
function getData(){
  return all.map(c=>({
    '姓名':c.name||'','公司名稱':c.company||'','來源／群組':c.group_name||'','電話1':c.phone||'','電話2':c.phone1||'',
    'Email':c.email||'','生日':c.birthday?isoToROC(c.birthday):'',
    '地址':c.address||'','備註/往來記錄':c.notes||'',
    '建立日期':c.created_at?new Date(c.created_at).toLocaleDateString('zh-TW'):''
  }));
}
function exportCSV(){
  if(!all.length){toast('尚無資料','er');return;}
  const cols=['姓名','公司名稱','電話','Email','生日','地址','備註/往來記錄','建立日期'];
  const rows=getData().map(r=>cols.map(k=>'"'+String(r[k]).replace(/"/g,'""')+'"').join(','));
  const csv='\uFEFF'+[cols.join(','),...rows].join('\n');
  dl(new Blob([csv],{type:'text/csv;charset=utf-8'}), '客戶資料_'+today()+'.csv');
  toast('✓ CSV 已匯出');
}
function exportXLSX(){
  if(!all.length){toast('尚無資料','er');return;}
  try{
    const ws=XLSX.utils.json_to_sheet(getData());
    ws['!cols']=[{wch:12},{wch:20},{wch:15},{wch:28},{wch:14},{wch:30},{wch:40},{wch:14}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,'往來客戶',ws);
    XLSX.writeFile(wb,'客戶資料_'+today()+'.xlsx');
    toast('✓ Excel 已匯出');
  }catch(e){toast('匯出失敗：'+e.message,'er');}
}
function today(){return new Date().toLocaleDateString('zh-TW').replace(/\//g,'-');}
function dl(blob, name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();}

// ── Google Drive ──
let gToken=null;
const GID=localStorage.getItem('gdrive_cid')||'';

function uploadGDrive(){
  if(!all.length){toast('尚無資料','er');return;}
  const cid=localStorage.getItem('gdrive_cid')||'';
  if(!cid){showGSetup();return;}
  if(gToken){doUpload(cid);return;}
  const script=document.createElement('script');
  script.src='https://accounts.google.com/gsi/client';
  script.onload=()=>{
    const client=google.accounts.oauth2.initTokenClient({
      client_id:cid, scope:'https://www.googleapis.com/auth/drive.file',
      callback:(r)=>{if(r.error){toast('Google 授權失敗','er');return;}gToken=r.access_token;doUpload(cid);}
    });
    client.requestAccessToken();
  };
  document.head.appendChild(script);
}

async function doUpload(cid){
  toast('上傳中...');
  try{
    const ws=XLSX.utils.json_to_sheet(getData());
    ws['!cols']=[{wch:12},{wch:20},{wch:15},{wch:28},{wch:14},{wch:30},{wch:40},{wch:14}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,'往來客戶',ws);
    const buf=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    const fname='客戶資料_'+today()+'.xlsx';
    const form=new FormData();
    form.append('metadata',new Blob([JSON.stringify({name:fname})],{type:'application/json'}));
    form.append('file',new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}));
    const r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
      method:'POST',headers:{Authorization:'Bearer '+gToken},body:form
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    toast('✓ 已上傳到 Google 雲端硬碟');
  }catch(e){gToken=null;toast('上傳失敗：'+e.message,'er');}
}

function showGSetup(){
  document.getElementById('dh-t').textContent='設定 Google 雲端硬碟';
  document.getElementById('dh-s').textContent='首次使用需要一次性設定';
  document.getElementById('dc').innerHTML=`
  <div style="background:#fffaeb;border:1px solid #fde68a;border-radius:8px;padding:14px;font-size:13px;color:#92400e;margin-bottom:18px;line-height:1.7;">
    <strong>⚠️ 首次需設定 Google Client ID</strong><br>按照下方步驟完成設定後即可使用。
  </div>
  ${[
    ['前往 Google Cloud Console','<a href="https://console.cloud.google.com" target="_blank" style="color:var(--blue)">console.cloud.google.com</a> → 建立或選擇專案'],
    ['啟用 Google Drive API','搜尋「Google Drive API」→ 點「啟用」'],
    ['建立 OAuth 憑證','左側「憑證」→「建立憑證」→「OAuth 用戶端 ID」→「網頁應用程式」→ 在「已授權的 JavaScript 來源」填入你的網址'],
    ['複製 Client ID','建立後複製「用戶端 ID」（格式：xxxxx.apps.googleusercontent.com）'],
    ['填入下方並儲存','將 Client ID 貼入下方欄位']
  ].map(([t,d],i)=>`<div class="step"><div class="step-n">${i+1}</div><div><div class="step-t">${t}</div><div class="step-d">${d}</div></div></div>`).join('')}
  <div class="fg" style="margin-top:6px">
    <label class="fl">Google OAuth Client ID</label>
    <input class="fi" id="gi-cid" placeholder="xxxxxxxx.apps.googleusercontent.com" style="font-family:monospace;font-size:12px;" value="${esc(localStorage.getItem('gdrive_cid')||'')}">
    <div class="fhint">Client ID 僅儲存在本機</div>
  </div>`;
  document.getElementById('df').innerHTML='<button class="btn btn-outline" id="btn-close2">取消</button><button class="btn btn-primary" id="btn-gsave">儲存並連線</button>';
  document.getElementById('btn-close2').onclick=closeDrawer;
  document.getElementById('btn-gsave').onclick=()=>{
    const v=document.getElementById('gi-cid').value.trim();
    if(!v||!v.includes('.apps.googleusercontent.com')){toast('請輸入正確的 Client ID','er');return;}
    localStorage.setItem('gdrive_cid',v);
    closeDrawer();
    toast('✓ Google 設定已儲存，請重新點「上傳到 Google 雲端硬碟」');
  };
  showDrawer();
}
